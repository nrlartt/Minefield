<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Classic Minesweeper-style puzzle game" />
  <meta name="x-ogp-key" content="5b221ece-b46a-4acd-b2ca-85b5ec22f0c1" id="ogp-key-meta" />
  <meta property="og:title" content="Lila Minefield" />
  <meta property="og:description" content="Classic Minesweeper-style puzzle game by Lila." />
  <meta property="og:image" content="./cover.jpg" />
  <title>Lila Minefield</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <img src="./cover.jpg" alt="Lila Minefield artwork" class="hero-art" />
      <div class="hero-text">
        <h1>💣 Lila Minefield</h1>
        <p>Premium classic minesweeper experience.</p>
      </div>
    </header>

    <section class="layout">
      <aside class="sidebar">
        <section class="panel topbar">
          <div class="controls vertical">
            <div class="mode-badge">Difficulty: <strong>Hard (30x16, 99 mines)</strong></div>
            <button id="new-game">New Game</button>
          </div>
        </section>

        <section class="panel hud sidebar-hud">
          <div>🚩 Mines Left: <span id="mines-left">0</span></div>
          <div>⏱️ Time: <span id="timer">0</span>s</div>
          <div>🏆 Score: <span id="score">0</span></div>
          <div>⚡ Combo: <span id="combo">x1</span></div>
          <div>Status: <span id="status">Ready</span></div>
        </section>
      </aside>

      <section class="game-area">
        <section id="board" class="board panel" aria-label="Minesweeper board"></section>
        <p class="help">
          Left click: reveal • Right click: flag • Mobile: long press = flag
        </p>
      </section>
    </section>
  </main>

  <script src="https://sdk.play.fun/latest"></script>
  <script src="script.js"></script>
</body>
</html>
